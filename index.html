<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | ICU HANDS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700;1,900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #F5A623; --orange-dark: #d48c0e; --orange-light: #ffc84a;
    --black: #0d0d0d; --white: #ffffff;
    --border: rgba(245,166,35,0.15);
    --card: #141414;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }
  nav {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 3rem; height: 68px;
    background: rgba(13,13,13,0.94); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
  .nav-logo img { height:42px; width:42px; border-radius:50%; object-fit:cover; }
  .nav-logo-text { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:1.25rem; letter-spacing:0.08em; color:var(--white); }
  .nav-logo-text span { color:var(--orange); }
  .nav-links { display:flex; gap:2rem; list-style:none; }
  .nav-links a { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.9rem; letter-spacing:0.12em; color:rgba(255,255,255,0.55); text-decoration:none; transition:color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color:var(--orange); }
  .nav-join { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:0.9rem; letter-spacing:0.15em; background:var(--orange); color:var(--black); padding:0.5rem 1.4rem; border-radius:2px; text-decoration:none; transition:background 0.2s; }
  .nav-join:hover { background:var(--orange-light); }
  footer { background:#060606; padding:2.5rem 3rem; border-top:1px solid rgba(245,166,35,0.1); display:grid; grid-template-columns:1fr auto; gap:2rem; align-items:center; }
  .footer-logo-wrap { display:flex; align-items:center; gap:1rem; }
  .footer-logo-wrap img { width:40px; height:40px; border-radius:50%; object-fit:cover; }
  .footer-name { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:1.15rem; letter-spacing:0.08em; color:var(--white); }
  .footer-sub { font-size:0.72rem; color:rgba(255,255,255,0.25); margin-top:0.3rem; }
  .footer-copy { font-family:'Barlow Condensed',sans-serif; font-weight:400; font-style:italic; font-size:0.7rem; letter-spacing:0.1em; color:rgba(255,255,255,0.18); }
  .reveal { opacity:0; transform:translateY(28px); transition:opacity 0.75s ease, transform 0.75s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .page-hero { min-height:38vh; display:flex; flex-direction:column; justify-content:flex-end; padding:0 3rem 3.5rem; padding-top:68px; position:relative; overflow:hidden; }
  .page-hero-bg { position:absolute; inset:0; z-index:0; background:radial-gradient(ellipse at 70% 50%, rgba(245,166,35,0.14) 0%, transparent 60%); }
  .page-hero-grid { position:absolute; inset:0; z-index:0; opacity:0.04; background-image:linear-gradient(rgba(245,166,35,1) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,1) 1px,transparent 1px); background-size:60px 60px; }
  .page-hero-label { font-family:'Barlow Condensed',sans-serif; font-weight:400; font-style:italic; font-size:0.78rem; letter-spacing:0.32em; color:var(--orange); margin-bottom:0.75rem; position:relative; z-index:1; display:flex; align-items:center; gap:0.75rem; animation:fadeUp 0.6s ease both; }
  .page-hero-label::before { content:''; width:32px; height:1px; background:var(--orange); }
  .page-hero-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:clamp(3.5rem,8vw,6rem); line-height:0.9; letter-spacing:0.02em; color:var(--white); position:relative; z-index:1; animation:fadeUp 0.7s 0.1s ease both; }
  .page-hero-title span { color:var(--orange); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .empty-msg { text-align:center; padding:4rem 0; font-family:'Barlow Condensed',sans-serif; font-style:italic; font-size:1rem; letter-spacing:0.15em; color:rgba(255,255,255,0.15); }

body { background:#0a0a0a; }
.admin-header { padding:88px 3rem 2rem; border-bottom:1px solid rgba(245,166,35,0.1); display:flex; align-items:center; justify-content:space-between; }
.admin-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:2rem; letter-spacing:0.05em; }
.admin-title span { color:var(--orange); }
.admin-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.3); margin-top:0.3rem; }

.admin-tabs { display:flex; padding:0 3rem; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.3); }
.admin-tab { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.9rem; letter-spacing:0.12em; color:rgba(255,255,255,0.3); background:none; border:none; cursor:pointer; padding:1rem 1.75rem; border-bottom:2px solid transparent; transition:all 0.2s; }
.admin-tab.active { color:var(--orange); border-bottom-color:var(--orange); }

.admin-body { padding:2.5rem 3rem; display:grid; grid-template-columns:1fr 440px; gap:2.5rem; align-items:start; }
.admin-tab-content { display:none; }
.admin-tab-content.active { display:block; }
.admin-body.admin-tab-content.active { display:grid; }

.admin-gender-tabs { display:flex; margin-bottom:1.25rem; gap:0.75rem; }
.ag-btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.8rem; letter-spacing:0.1em; border:1.5px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.35); background:none; cursor:pointer; padding:0.45rem 1.2rem; border-radius:2px; transition:all 0.2s; }
.ag-btn.active[data-g="men"]     { border-color:#4fa8e0; color:#4fa8e0; background:rgba(79,168,224,0.1); }
.ag-btn.active[data-g="women"]   { border-color:#e084b0; color:#e084b0; background:rgba(224,132,176,0.1); }
.ag-btn.active[data-g="manager"] { border-color:var(--orange); color:var(--orange); background:rgba(245,166,35,0.1); }

.filter-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:1.5rem; }
.filter-btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.8rem; letter-spacing:0.1em; color:rgba(255,255,255,0.3); background:none; border:none; cursor:pointer; padding:0.6rem 1.2rem; border-bottom:2px solid transparent; transition:all 0.2s; }
.filter-btn.active { color:var(--orange); border-bottom-color:var(--orange); }

.row { display:grid; gap:0.75rem; padding:0.85rem 0.75rem; border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s; align-items:center; }
.match-row-grid { grid-template-columns:100px 1fr 90px 70px; }
.member-row-grid { grid-template-columns:52px 52px 1fr 80px; }
.row:hover { background:rgba(255,255,255,0.02); }
.row-date { font-family:'Barlow Condensed',sans-serif; font-style:italic; font-size:0.8rem; color:rgba(255,255,255,0.35); }
.row-info .name { font-weight:700; font-size:0.88rem; }
.row-info .sub { font-size:0.72rem; color:rgba(255,255,255,0.3); margin-top:1px; }
.row-score { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:1.1rem; color:var(--orange); text-align:center; }
.row-pos { text-align:center; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:0.95rem; color:rgba(245,166,35,0.6); }
.row-thumb { width:44px; height:44px; border-radius:3px; object-fit:cover; background:#222; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.row-thumb img { width:100%; height:100%; object-fit:cover; }
.row-thumb-placeholder { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:0.7rem; color:rgba(245,166,35,0.3); }
.row-actions { display:flex; gap:0.4rem; justify-content:flex-end; }
.btn-edit, .btn-del { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.68rem; letter-spacing:0.08em; border:none; cursor:pointer; border-radius:2px; padding:0.3rem 0.65rem; transition:all 0.15s; }
.btn-edit { background:rgba(245,166,35,0.12); color:var(--orange); }
.btn-edit:hover { background:rgba(245,166,35,0.22); }
.btn-del { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.3); }
.btn-del:hover { background:rgba(255,60,60,0.15); color:#ff6b6b; }

/* FORM */
.admin-form-card { background:var(--card); border:1px solid rgba(245,166,35,0.1); border-radius:4px; padding:1.75rem; position:sticky; top:88px; max-height:calc(100vh - 120px); overflow-y:auto; }
.form-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:1.1rem; letter-spacing:0.08em; color:var(--white); margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.06); }
.form-title span { color:var(--orange); }
.form-group { margin-bottom:1rem; }
.form-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.68rem; letter-spacing:0.15em; color:rgba(255,255,255,0.4); display:block; margin-bottom:0.4rem; }
.form-input, .form-select { width:100%; background:#1c1c1c; border:1px solid rgba(255,255,255,0.08); color:var(--white); padding:0.65rem 0.9rem; border-radius:3px; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; transition:border-color 0.2s; outline:none; }
.form-input:focus, .form-select:focus { border-color:var(--orange); }
.form-input::placeholder { color:rgba(255,255,255,0.2); }
.form-select option { background:#1c1c1c; }

/* PHOTO UPLOAD */
.photo-upload-area {
  border:2px dashed rgba(245,166,35,0.2); border-radius:4px;
  padding:1.5rem; text-align:center; cursor:pointer; transition:all 0.2s;
  position:relative;
}
.photo-upload-area:hover { border-color:rgba(245,166,35,0.5); background:rgba(245,166,35,0.04); }
.photo-upload-area.has-photo { border-style:solid; border-color:rgba(245,166,35,0.4); padding:0; overflow:hidden; }
.photo-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-preview { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
.upload-icon { font-size:1.8rem; margin-bottom:0.5rem; opacity:0.3; }
.upload-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.75rem; letter-spacing:0.12em; color:rgba(255,255,255,0.35); display:block; }
.upload-sub { font-size:0.7rem; color:rgba(255,255,255,0.2); margin-top:0.25rem; }
.btn-remove-photo { display:none; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.72rem; letter-spacing:0.1em; background:rgba(255,60,60,0.15); color:#ff6b6b; border:none; cursor:pointer; padding:0.4rem 0.75rem; border-radius:2px; margin-top:0.5rem; transition:background 0.15s; width:100%; }
.btn-remove-photo:hover { background:rgba(255,60,60,0.25); }
.btn-remove-photo.visible { display:block; }

.score-row { display:grid; grid-template-columns:1fr 20px 1fr; gap:0.5rem; align-items:center; }
.score-sep { text-align:center; color:rgba(255,255,255,0.3); font-family:'Barlow Condensed',sans-serif; font-weight:700; }
.form-actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
.btn-save { flex:1; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-style:italic; font-size:0.9rem; letter-spacing:0.12em; background:var(--orange); color:var(--black); border:none; cursor:pointer; padding:0.8rem; border-radius:2px; transition:background 0.2s; }
.btn-save:hover { background:var(--orange-light); }
.btn-cancel { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.9rem; letter-spacing:0.12em; background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4); border:none; cursor:pointer; padding:0.8rem 1.2rem; border-radius:2px; transition:background 0.2s; }
.btn-cancel:hover { background:rgba(255,255,255,0.09); }
.toast { position:fixed; bottom:2rem; right:2rem; z-index:9999; background:var(--orange); color:var(--black); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-style:italic; font-size:0.88rem; letter-spacing:0.1em; padding:0.75rem 1.5rem; border-radius:3px; transform:translateY(80px); opacity:0; transition:all 0.3s; }
.toast.show { transform:translateY(0); opacity:1; }
</style>
</head>

          <span class="upload-label">クリックして写真を選択</span>
          <span class="upload-sub">JPG / PNG / HEIC</span>
        </div>
        <img class="upload-preview" id="photoPreview" style="display:none;">
      </div>
      <button class="btn-remove-photo" id="btnRemovePhoto" onclick="removePhoto()">× 写真を削除</button>
    </div>

    <div class="form-group"><label class="form-label">GENDER</label><select class="form-select" id="mGender"><option value="men">男子</option><option value="women">女子</option><option value="manager">マネージャー</option></select></div>
    <div class="form-group"><label class="form-label">NAME</label><input class="form-input" type="text" id="mName" placeholder="名前"></div>
    <div class="form-group"><label class="form-label">YEAR</label><select class="form-select" id="mYear"><option value="1">1年</option><option value="2">2年</option><option value="3">3年</option><option value="4">4年</option></select></div>
    <div class="form-group" id="posGroup"><label class="form-label">POSITION</label><select class="form-select" id="mPosition"><option value="GK">GK</option><option value="CB">CB</option><option value="LB">LB</option><option value="RB">RB</option><option value="LW">LW</option><option value="RW">RW</option><option value="CF">CF</option><option value="FB">FB</option></select></div>
    <div class="form-group"><label class="form-label">ORIGIN</label><input class="form-input" type="text" id="mOrigin" placeholder="都道府県・出身高校等"></div>
    <div class="form-group"><label class="form-label">ENTRY</label><input class="form-input" type="text" id="mEntry" placeholder="入部きっかけ"></div>
    <div class="form-group"><label class="form-label">SKILL / HOBBY</label><input class="form-input" type="text" id="mSkill" placeholder="特技・趣味"></div>
    <div class="form-group"><label class="form-label">COMMENT</label><input class="form-input" type="text" id="mComment" placeholder="一言コメント"></div>
    <div class="form-actions"><button class="btn-save" id="btnMemberSave">保存する</button><button class="btn-cancel" id="btnMemberCancel" style="display:none">キャンセル</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SM = [{"id":1,"date":"2025-05-10","league":"spring","gender":"men","opponent":"青山学院大学","venue":"青山学院大学体育館","home":true,"scoreUs":28,"scoreThem":21,"status":"done"},{"id":2,"date":"2025-05-10","league":"spring","gender":"women","opponent":"津田塾大学","venue":"津田塾大学体育館","home":false,"scoreUs":24,"scoreThem":18,"status":"done"}];
const SMB = [{"id": 1, "name": "山田太郎", "year": "4", "gender": "men", "position": "GK", "origin": "東京都・湘南学園", "entry": "ハンドボールの魅力に惹かれて", "skill": "守備・反射神経", "comment": "最後の年、全力でチームを支えます", "photo": ""}, {"id": 2, "name": "鈴木一郎", "year": "2", "gender": "men", "position": "CB", "origin": "埼玉県・志木高校", "entry": "大学で始めた", "skill": "背の高さ・シュート", "comment": "まだまだ成長中です", "photo": ""}, {"id": 3, "name": "鈴木健太", "year": "2", "gender": "men", "position": "CF", "origin": "愛知県・豊田高校", "entry": "高校の部活から", "skill": "シュート精度・状況判断", "comment": "連覇を目指して全力で", "photo": ""}, {"id": 4, "name": "佐藤花子", "year": "3", "gender": "women", "position": "LW", "origin": "神奈川県・慶應義塾大学附属", "entry": "中学から続けていて", "skill": "スピード・判断力", "comment": "攻撃のスピード感を大事に", "photo": ""}, {"id": 5, "name": "田中美咲", "year": "1", "gender": "women", "position": "RW", "origin": "千葉県・市原高校", "entry": "友人の誘いで", "skill": "ドリブル・体の柔軟性", "comment": "チームの一員として頑張ります", "photo": ""}, {"id": 6, "name": "工藤由美", "year": "3", "gender": "women", "position": "RB", "origin": "大阪府・大阪桐蔭高校", "entry": "小学校から", "skill": "パス精度・ディフェンス", "comment": "先輩として後輩をサポート", "photo": ""}, {"id": 7, "name": "林あかり", "year": "2", "gender": "manager", "position": "MGR", "origin": "東京都・豊島高校", "entry": "友人に誘われて", "skill": "写真・動画編集", "comment": "みんなが輝けるようサポートします", "photo": ""}, {"id": 8, "name": "中村さくら", "year": "1", "gender": "manager", "position": "MGR", "origin": "神奈川県・横浜高校", "entry": "スポーツが好きで", "skill": "料理・栄養管理", "comment": "チームのために全力で頑張ります", "photo": ""}];
const WD = ['日','月','火','水','木','金','土'];
const PL = {GK:'ゴールキーパー',FB:'フルバック',LW:'レフトウイング',CF:'センターフォワード',RW:'ライトウイング',LB:'レフトバック',RB:'ライトバック',CB:'センターバック',MGR:'マネージャー'};

function getMatches() { try { const s=localStorage.getItem('icuhands_matches'); return s?JSON.parse(s):SM; } catch(e) { return SM; } }
function saveMatches(a) { localStorage.setItem('icuhands_matches',JSON.stringify(a)); }
function getMembers() { try { const s=localStorage.getItem('icuhands_members'); return s?JSON.parse(s):SMB; } catch(e) { return SMB; } }
function saveMembers(a) { localStorage.setItem('icuhands_members',JSON.stringify(a)); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ── PHOTO HANDLING ──────────────────────────────────────────
let currentPhotoData = '';
function handlePhoto(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentPhotoData = ev.target.result;
    const preview = document.getElementById('photoPreview');
    const prompt = document.getElementById('uploadPrompt');
    const area = document.getElementById('photoUploadArea');
    preview.src = currentPhotoData;
    preview.style.display = 'block';
    prompt.style.display = 'none';
    area.classList.add('has-photo');
    document.getElementById('btnRemovePhoto').classList.add('visible');
  };
  reader.readAsDataURL(file);
}
function removePhoto() {
  currentPhotoData = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoPreview').src = '';
  document.getElementById('uploadPrompt').style.display = 'block';
  document.getElementById('photoUploadArea').classList.remove('has-photo');
  document.getElementById('btnRemovePhoto').classList.remove('visible');
  document.getElementById('mPhoto').value = '';
}
function setPhotoPreview(src) {
  if (!src) { removePhoto(); return; }
  currentPhotoData = src;
  const preview = document.getElementById('photoPreview');
  preview.src = src; preview.style.display = 'block';
  document.getElementById('uploadPrompt').style.display = 'none';
  document.getElementById('photoUploadArea').classList.add('has-photo');
  document.getElementById('btnRemovePhoto').classList.add('visible');
}

// ── MATCHES ─────────────────────────────────────────────────
let mGender='men', mLeague='spring', editingId=null;

function renderMatchList() {
  const all=getMatches();
  const list=mLeague==='all'?all.filter(m=>m.gender===mGender):all.filter(m=>m.gender===mGender&&m.league===mLeague);
  const sorted=[...list].sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('adminList');
  if(!sorted.length){el.innerHTML='<div class="empty-msg">NO MATCHES</div>';return;}
  el.innerHTML=sorted.map(m=>{
    const dt=new Date(m.date);const wd=WD[dt.getDay()];
    const score=m.status==='done'?`${m.scoreUs} – ${m.scoreThem}`:'UPCOMING';
    return `<div class="row match-row-grid">
      <div class="row-date">${m.date.replace(/-/g,'.')}<br>(${wd})</div>
      <div class="row-info"><div class="name">vs ${m.opponent}</div><div class="sub">${m.venue}</div></div>
      <div class="row-score">${score}</div>
      <div class="row-actions"><button class="btn-edit" onclick="startEditMatch(${m.id})">編集</button><button class="btn-del" onclick="deleteMatch(${m.id})">削除</button></div>
    </div>`;
  }).join('');
}
function clearMatchForm() {
  editingId=null;
  document.getElementById('formTitle').innerHTML='試合を<span>追加</span>';
  ['fDate','fOpponent','fVenue','fTime','fScoreUs','fScoreThem'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fGender').value='men';
  document.getElementById('fLeague').value='spring';
  document.getElementById('fHome').checked=false;
  document.getElementById('btnSave').textContent='保存する';
  document.getElementById('btnCancel').style.display='none';
}
function startEditMatch(id) {
  const m=getMatches().find(x=>x.id===id);if(!m)return;
  editingId=id;
  document.getElementById('formTitle').innerHTML='試合を<span>編集</span>';
  document.getElementById('fGender').value=m.gender;
  document.getElementById('fDate').value=m.date;
  document.getElementById('fLeague').value=m.league;
  document.getElementById('fOpponent').value=m.opponent;
  document.getElementById('fVenue').value=m.venue;
  document.getElementById('fTime').value=m.time||'';
  document.getElementById('fHome').checked=m.home;
  document.getElementById('fScoreUs').value=m.scoreUs??'';
  document.getElementById('fScoreThem').value=m.scoreThem??'';
  document.getElementById('btnSave').textContent='更新する';
  document.getElementById('btnCancel').style.display='inline-block';
}
function deleteMatch(id){if(!confirm('削除しますか？'))return;saveMatches(getMatches().filter(m=>m.id!==id));renderMatchList();showToast('削除しました');}
document.getElementById('btnSave').addEventListener('click',()=>{
  const date=document.getElementById('fDate').value;
  const opponent=document.getElementById('fOpponent').value.trim();
  const venue=document.getElementById('fVenue').value.trim();
  if(!date||!opponent||!venue){alert('日付・対戦相手・会場は必須です');return;}
  const su=document.getElementById('fScoreUs').value,st=document.getElementById('fScoreThem').value;
  const hasSc=su!==''&&st!=='';
  const entry={id:editingId??Date.now(),gender:document.getElementById('fGender').value,date,time:document.getElementById('fTime').value,league:document.getElementById('fLeague').value,opponent,venue,home:document.getElementById('fHome').checked,scoreUs:hasSc?parseInt(su):null,scoreThem:hasSc?parseInt(st):null,status:hasSc?'done':'upcoming'};
  let arr=getMatches();
  if(editingId){arr=arr.map(m=>m.id===editingId?entry:m);showToast('更新しました');}else{arr.push(entry);showToast('追加しました');}
  saveMatches(arr);clearMatchForm();renderMatchList();
});
document.getElementById('btnCancel').addEventListener('click',clearMatchForm);
document.querySelectorAll('#matchGenderTabs .ag-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('#matchGenderTabs .ag-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mGender=btn.dataset.g;renderMatchList();});
});
document.querySelectorAll('#matchLeagueTabs .filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('#matchLeagueTabs .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mLeague=btn.dataset.f;renderMatchList();});
});

// ── MEMBERS ─────────────────────────────────────────────────
let mbGender='men', editingMemberId=null;

// Hide position for manager
document.getElementById('mGender').addEventListener('change', e => {
  document.getElementById('posGroup').style.display = e.target.value === 'manager' ? 'none' : 'block';
});

function renderMemberList() {
  const members=getMembers().filter(m=>m.gender===mbGender);
  const sorted=[...members].sort((a,b)=>a.name.localeCompare(b.name));
  const el=document.getElementById('adminMemberList');
  if(!sorted.length){el.innerHTML='<div class="empty-msg">NO MEMBERS</div>';return;}
  el.innerHTML=sorted.map(m=>{
    const thumbHTML = m.photo
      ? `<div class="row-thumb"><img src="${m.photo}" alt="${m.name}"></div>`
      : `<div class="row-thumb"><span class="row-thumb-placeholder">${m.position}</span></div>`;
    return `<div class="row member-row-grid">
      ${thumbHTML}
      <div class="row-pos">${m.position}</div>
      <div class="row-info"><div class="name">${m.name}</div><div class="sub">${m.year}年 / ${m.origin}</div></div>
      <div class="row-actions"><button class="btn-edit" onclick="startEditMember(${m.id})">編集</button><button class="btn-del" onclick="deleteMember(${m.id})">削除</button></div>
    </div>`;
  }).join('');
}
function clearMemberForm() {
  editingMemberId=null;
  document.getElementById('memberFormTitle').innerHTML='部員を<span>追加</span>';
  ['mName','mOrigin','mEntry','mSkill','mComment'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mGender').value='men';
  document.getElementById('mYear').value='1';
  document.getElementById('mPosition').value='GK';
  document.getElementById('posGroup').style.display='block';
  document.getElementById('btnMemberSave').textContent='保存する';
  document.getElementById('btnMemberCancel').style.display='none';
  removePhoto();
}
function startEditMember(id) {
  const m=getMembers().find(x=>x.id===id);if(!m)return;
  editingMemberId=id;
  document.getElementById('memberFormTitle').innerHTML='部員を<span>編集</span>';
  document.getElementById('mGender').value=m.gender;
  document.getElementById('mName').value=m.name;
  document.getElementById('mYear').value=m.year;
  document.getElementById('mPosition').value=m.position||'GK';
  document.getElementById('mOrigin').value=m.origin;
  document.getElementById('mEntry').value=m.entry;
  document.getElementById('mSkill').value=m.skill;
  document.getElementById('mComment').value=m.comment;
  document.getElementById('posGroup').style.display=m.gender==='manager'?'none':'block';
  document.getElementById('btnMemberSave').textContent='更新する';
  document.getElementById('btnMemberCancel').style.display='inline-block';
  setPhotoPreview(m.photo||'');
  document.querySelector('#tab-members .admin-form-card').scrollIntoView({behavior:'smooth'});
}
function deleteMember(id){if(!confirm('削除しますか？'))return;saveMembers(getMembers().filter(m=>m.id!==id));renderMemberList();showToast('削除しました');}
document.getElementById('btnMemberSave').addEventListener('click',()=>{
  const name=document.getElementById('mName').value.trim();
  const origin=document.getElementById('mOrigin').value.trim();
  const entry=document.getElementById('mEntry').value.trim();
  const skill=document.getElementById('mSkill').value.trim();
  const comment=document.getElementById('mComment').value.trim();
  const gender=document.getElementById('mGender').value;
  if(!name||!origin||!entry||!skill||!comment){alert('すべてのフィールドは必須です');return;}
  const member={
    id:editingMemberId??Date.now(),
    gender,name,year:document.getElementById('mYear').value,
    position:gender==='manager'?'MGR':document.getElementById('mPosition').value,
    origin,entry,skill,comment,
    photo:currentPhotoData
  };
  let arr=getMembers();
  if(editingMemberId){arr=arr.map(m=>m.id===editingMemberId?member:m);showToast('更新しました');}else{arr.push(member);showToast('追加しました');}
  saveMembers(arr);clearMemberForm();renderMemberList();
});
document.getElementById('btnMemberCancel').addEventListener('click',clearMemberForm);
document.querySelectorAll('#memberGenderTabs .ag-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('#memberGenderTabs .ag-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mbGender=btn.dataset.g;renderMemberList();});
});

// ── TAB SWITCHING ────────────────────────────────────────────
document.querySelectorAll('.admin-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.admin-tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

renderMatchList();
renderMemberList();
</script>
